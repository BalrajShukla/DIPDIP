<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIP-DIP Scale - Mobile Friendly</title>
    <style>
        /* Dark Theme Variables */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --accent-blue: #4facfe;
            --success-green: #00e676;
            --warning-yellow: #ffea00;
            --danger-red: #ff1744;
        }

        body { 
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
        }
        
        .container { 
            background-color: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color);
        }
        
        h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        
        .reference {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }
        .reference a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        .reference a:hover { text-decoration: underline; }
        
        /* Dashboard & Gauge Styles */
        .dashboard { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 40px; 
            padding: 30px 20px; 
            background: #252525; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }
        
        .gauge-container {
            width: 240px; height: 120px;
            position: relative; overflow: hidden;
            margin-bottom: 15px;
        }
        .gauge-bg {
            width: 240px; height: 240px;
            box-sizing: border-box; border-radius: 50%;
            border: 30px solid #333;
            position: absolute; top: 0; left: 0;
            border-bottom-color: transparent; border-right-color: transparent;
            transform: rotate(45deg);
        }
        .gauge-fill {
            width: 240px; height: 240px;
            box-sizing: border-box; border-radius: 50%;
            border: 30px solid var(--success-green);
            position: absolute; top: 0; left: 0;
            border-bottom-color: transparent; border-right-color: transparent;
            transform: rotate(-135deg); 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.6s;
        }
        
        .score-container {
            position: absolute; bottom: 0; width: 100%;
            text-align: center; padding-bottom: 5px;
        }
        .score-display { 
            font-size: 48px; font-weight: bold; color: #ffffff; line-height: 1; 
        }
        .score-max { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
        
        .inference-badge { 
            margin-top: 15px; padding: 8px 24px; border-radius: 30px; 
            font-weight: bold; font-size: 16px; color: #121212; 
            background-color: var(--success-green); 
            transition: background-color 0.6s, color 0.6s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .inference-text { 
            margin-top: 15px; text-align: center; font-size: 16px; 
            color: #cccccc; max-width: 550px; line-height: 1.5;
        }

        /* Toggle Question Layout (Desktop Default) */
        .question { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px; 
            padding: 20px; 
            background: #2a2a2a;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: background 0.3s;
        }
        .question:hover { background: #303030; }
        
        .question-text { 
            flex: 1;
            font-size: 16px; 
            line-height: 1.5;
            padding-right: 20px;
        }

        /* CSS Toggle Switch */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toggle-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-muted);
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 30px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(30px); }
        .yes-active { color: var(--accent-blue); }

        /* =========================================
           MOBILE RESPONSIVENESS (Media Queries)
           ========================================= */
        @media (max-width: 650px) {
            body { padding: 10px; }
            .container { padding: 25px 15px; }
            
            h2 { font-size: 20px; }
            .inference-text { font-size: 14px; }
            
            /* Stack the question text and the toggle switch */
            .question {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px;
                gap: 15px;
            }
            .question-text {
                padding-right: 0;
                font-size: 15px;
            }
            /* Align the toggle switch nicely on the bottom row */
            .toggle-wrapper {
                width: 100%;
                justify-content: flex-end;
                padding-top: 10px;
                border-top: 1px dashed var(--border-color);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Digital Interface Patterning for Detecting Illegitimate Publications (DIP-DIP)</h2>
    <div class="reference">
        Reference: <a href="https://doi.org/10.3138/jsp-2024-0059" target="_blank">https://doi.org/10.3138/jsp-2024-0059</a>
    </div>
    
    <div class="dashboard">
        <div class="gauge-container">
            <div class="gauge-bg"></div>
            <div class="gauge-fill" id="gaugeFill"></div>
            <div class="score-container">
                <div class="score-display" id="scoreDisplay">0</div>
                <div class="score-max">out of 6</div>
            </div>
        </div>
        <div class="inference-badge" id="inferenceBadge">Low Risk</div>
        <div class="inference-text" id="inferenceText">Minimal predatory traits detected on the digital interface.</div>
    </div>

    <form id="dipdipForm">
        </form>
</div>

<script>
    const questions = [
        "1. Promises of rapid publication on spam mails or journal website.",
        "2. Unprofessional layout of website (pixelated graphics, flashy, scrolling content).",
        "3. Outdated or lack of manuscript handling system.",
        "4. Flawed website design (broken links, difficult navigation).",
        "5. Publication costs (low, high, or free) mentioned on home page of the journal.",
        "6. Non-professional contact email (personal email ids like @gmail.com, @outlook.com, @yahoo.com, etc)."
    ];

    const form = document.getElementById('dipdipForm');
    
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
            <div class="question-text">${q}</div>
            <div class="toggle-wrapper">
                <span class="toggle-text no-text">NO</span>
                <label class="switch">
                    <input type="checkbox" class="score-checkbox" onchange="updateScore(this)">
                    <span class="slider"></span>
                </label>
                <span class="toggle-text yes-text">YES</span>
            </div>
        `;
        form.appendChild(div);
    });

    function updateScore(toggledElement) {
        if(toggledElement) {
            const yesText = toggledElement.parentElement.nextElementSibling;
            if(toggledElement.checked) {
                yesText.classList.add('yes-active');
            } else {
                yesText.classList.remove('yes-active');
            }
        }

        const checkboxes = document.querySelectorAll('.score-checkbox');
        let totalScore = 0;
        
        checkboxes.forEach(chk => {
            if (chk.checked) totalScore += 1;
        });

        document.getElementById('scoreDisplay').innerText = totalScore;

        const degrees = -135 + (totalScore / 6) * 180;
        const gaugeFill = document.getElementById('gaugeFill');
        gaugeFill.style.transform = `rotate(${degrees}deg)`;

        const badge = document.getElementById('inferenceBadge');
        const text = document.getElementById('inferenceText');

        if (totalScore <= 1) {
            gaugeFill.style.borderColor = 'var(--success-green) transparent transparent var(--success-green)';
            badge.style.backgroundColor = 'var(--success-green)';
            badge.style.color = '#121212';
            badge.innerText = "Low Risk";
            text.innerText = "Minimal predatory traits detected on the digital interface. The journal is likely legitimate.";
        } else if (totalScore >= 2 && totalScore <= 3) {
            gaugeFill.style.borderColor = 'var(--warning-yellow) transparent transparent var(--warning-yellow)';
            badge.style.backgroundColor = 'var(--warning-yellow)';
            badge.style.color = '#121212'; 
            badge.innerText = "Moderate Risk";
            text.innerText = "Several questionable traits present. Proceed with caution and investigate the journal further.";
        } else {
            gaugeFill.style.borderColor = 'var(--danger-red) transparent transparent var(--danger-red)';
            badge.style.backgroundColor = 'var(--danger-red)';
            badge.style.color = '#ffffff';
            badge.innerText = "High Risk";
            text.innerText = "Strong likelihood of being an illegitimate/predatory publication based on digital interface cues.";
        }
    }

    updateScore();
</script>

</body>
</html>
